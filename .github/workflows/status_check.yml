name: Telegram Status Check
on:
  schedule:
    - cron: '*/10 * * * *'   # ehtiyat (backup) — cron-job.org işləməsə belə tam dayanmasın
  workflow_dispatch: {}       # Actions tabından əl ilə işə salmaq üçün
  repository_dispatch:
    types: [telegram-check]   # cron-job.org bunu tetikləyəcək
permissions:
  contents: write

# daily_bot.yml ilə EYNI qrup adı — hər iki workflow eyni fayllara (main
# branch) push etdiyi üçün, ikisi arasında da növbələşmə lazımdır.
concurrency:
  group: forex-bot-repo-write
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu çıxar
        uses: actions/checkout@v4
      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Asılılıqları quraşdır
        run: pip install -r requirements.txt
      - name: Telegram mesajlarını yoxla
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python status_check.py
      - name: Offset faylını commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          if [ -f telegram_offset.txt ]; then
            git add telegram_offset.txt
            if git commit -m "Update telegram offset"; then
              push_ok=false
              for i in 1 2 3 4 5; do
                if git pull --rebase origin main && git push origin main; then
                  push_ok=true
                  break
                fi
                echo "Push uğursuz oldu (cəhd $i/5), 5 saniyə sonra yenidən cəhd ediləcək..."
                sleep 5
              done
              if [ "$push_ok" != "true" ]; then
                echo "::warning::5 cəhddən sonra push uğursuz oldu, offset bu run-da yenilənmədi."
              fi
            else
              echo "Dəyişiklik yoxdur."
            fi
          else
            echo "telegram_offset.txt tapılmadı, commit edilmədi."
          fi
