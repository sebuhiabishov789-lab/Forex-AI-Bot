name: Telegram Status Check

on:
  schedule:
    - cron: '*/5 * * * *'   # hər 5 dəqiqədən bir (GitHub-un icazə verdiyi minimum interval)
  workflow_dispatch: {}       # Actions tabından əl ilə işə salmaq üçün

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu çıxar
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asılılıqları quraşdır
        run: pip install -r requirements.txt

      - name: Telegram mesajlarını yoxla
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python status_check.py

      - name: Offset faylını commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          if [ -f telegram_offset.txt ]; then
            git add telegram_offset.txt
            git commit -m "Update telegram offset" || echo "Dəyişiklik yoxdur"
            git push
          else
            echo "telegram_offset.txt tapılmadı, commit edilmədi."
          fi
