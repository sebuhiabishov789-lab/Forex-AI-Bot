name: Forex AI Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [forex-bot-check]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu çıxar
        uses: actions/checkout@v4

      - name: Python qurulması
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kitabxanaları yüklə
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Telegram statusunu yoxla (status_check.py)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python status_check.py

      - name: Botu çalışdır (bot.py)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Dəyişiklikləri commit et və push et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Dəyişiklikləri yoxla (fayllardan biri belə dəyişibsə davam et)
          if [[ -n $(git status --porcelain) ]]; then
            git pull --rebase origin main
            git add signals_log.csv daily_signal_state.json telegram_offset.txt
            git commit -m "Update signal logs, state, and offset"
            git push origin main
          else
            echo "Heç bir dəyişiklik yoxdur."
          fi
