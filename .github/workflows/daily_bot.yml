name: Forex AI Bot
on:
  schedule:
    - cron: '0,15,30,45 * * * *' # hər 15 dəq bəsdir
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: forex-bot-repo-write
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Botu çalışdır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add signals_log.csv daily_signal_state.json || true
          git diff --staged --quiet || (git commit -m "bot signal [skip ci]" && git pull --rebase origin main && git push)
