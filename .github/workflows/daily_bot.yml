name: Forex AI Bot
on:
  schedule:
    - cron: '*/20 * * * *'   # ehtiyat (backup) — cron-job.org işləməsə belə tam dayanmasın
  workflow_dispatch:
  repository_dispatch:
    types: [forex-bot-check]   # cron-job.org bunu tetikləyəcək
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python qurulması
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kitabxanaları yüklə
        run: pip install pandas yfinance scikit-learn requests
      - name: Botu çalışdır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
