name: Forex AI Bot
on:
  schedule:
    - cron: '*/5 * * * *'   # ehtiyat (backup) — cron-job.org işləməsə belə tam dayanmasın
  workflow_dispatch:
  repository_dispatch:
    types: [forex-bot-check]   # cron-job.org bunu tetikləyəcək
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python qurulması
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kitabxanaları yüklə
        run: pip install pandas yfinance scikit-learn requests
      - name: Botu çalışdır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
      - name: Siqnal tarixçəsini və gündəlik limiti commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add signals_log.csv daily_signal_state.json 2>/dev/null || true
          git commit -m "Update signal log and daily state" || echo "Dəyişiklik yoxdur"
          git push
