name: Forex AI Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [forex-bot-check]

permissions:
  contents: write

# İki workflow (bu və Telegram Status Check) eyni fayllara push edir.
# Paralel run-lar eyni anda push etməyə çalışanda "non-fast-forward" xətası
# yaranırdı. Bu concurrency qrupu ilə eyni adlı run-lar növbəyə düzülür,
# eyni anda işləmir — beləliklə push konflikti aradan qalxır.
concurrency:
  group: forex-bot-repo-write
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu çıxar
        uses: actions/checkout@v4

      - name: Python qurulması
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kitabxanaları yüklə
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Telegram statusunu yoxla
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python status_check.py

      - name: Botu çalışdır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Dəyişiklikləri commit et və push et
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Remot-u token ilə yeniləyirik
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # Faylları yoxla və əlavə et
          for file in signals_log.csv daily_signal_state.json telegram_offset.txt; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          # Dəyişiklik varsa commit et və push et
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Update signal logs, state, and offset"

            # Push zamanı digər paralel run push etmiş ola bilər — belə halda
            # rebase edib yenidən cəhd edirik (maks. 5 dəfə).
            push_ok=false
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then
                push_ok=true
                break
              fi
              echo "Push uğursuz oldu (cəhd $i/5), 5 saniyə sonra yenidən cəhd ediləcək..."
              sleep 5
            done

            if [ "$push_ok" != "true" ]; then
              echo "::warning::5 cəhddən sonra push uğursuz oldu, state faylları bu run-da yenilənmədi."
            fi
          else
            echo "Heç bir yeni dəyişiklik yoxdur."
          fi
