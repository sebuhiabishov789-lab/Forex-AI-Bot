name: Outcome Tracker

on:
  schedule:
    - cron: '*/15 * * * *'   # hər 15 dəqiqə
  workflow_dispatch:          # manual başlatma imkanı

permissions:
  contents: write            # repo-ya push etmək icazəsi

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Reponu klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python qur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Asılılıqları yüklə
        run: pip install -r requirements.txt

      - name: İzləmə skriptini işə sal
        run: python outcome_tracker.py

      - name: Dəyişiklikləri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f signals_log.csv ]; then
            git add signals_log.csv
            git diff --staged --quiet || git commit -m "Siqnal nəticələri yeniləndi"
            git pull --rebase
            git push
          else
            echo "signals_log.csv hələ yaradılmayıb, commit ediləcək heç nə yoxdur."
          fi
