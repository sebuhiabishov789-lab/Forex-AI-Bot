name: Outcome Tracker

on:
  schedule:
    - cron: '*/30 * * * *'   # hər 30 dəqiqə
  workflow_dispatch:          # manual başlatma imkanı

permissions:
  contents: write            # repo-ya push etmək icazəsi

# daily_bot.yml və status_check.yml ilə EYNI qrup adı — üçü də main branch-a
# push etdiyi üçün, aralarında növbələşmə lazımdır (yoxsa push conflict/race olur).
concurrency:
  group: forex-bot-repo-write
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Reponu klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python qur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Asılılıqları yüklə
        run: pip install -r requirements.txt

      - name: İzləmə skriptini işə sal
        run: python outcome_tracker.py

      - name: Dəyişiklikləri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f signals_log.csv ]; then
            git add signals_log.csv
            if git diff --staged --quiet; then
              echo "Dəyişiklik yoxdur."
            else
              git commit -m "Siqnal nəticələri yeniləndi"
              push_ok=false
              for i in 1 2 3 4 5; do
                if git pull --rebase origin main && git push origin main; then
                  push_ok=true
                  break
                fi
                echo "Push uğursuz oldu (cəhd $i/5), 5 saniyə sonra yenidən cəhd ediləcək..."
                sleep 5
              done
              if [ "$push_ok" != "true" ]; then
                echo "::warning::5 cəhddən sonra push uğursuz oldu, nəticələr bu run-da yenilənmədi."
              fi
            fi
          else
            echo "signals_log.csv hələ yaradılmayıb, commit ediləcək heç nə yoxdur."
          fi
